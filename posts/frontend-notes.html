        <h1>前端体验优化清单</h1>
        <p>做个人站点时，我优先关注可读性和速度。字体先定调，颜色形成层次，再用少量动效提升质感。</p>
<p>其次是结构语义化：合理使用 <code>header</code>、<code>main</code>、<code>article</code> 等元素，方便 SEO 和可访问性。</p>
<p>最后是性能策略：尽可能静态化、避免不必要依赖、压缩资源并启用缓存。</p>
