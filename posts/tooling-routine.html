        <h1>我的开发工具流</h1>
        <p>我把高频动作拆成固定流程：创建任务、编码、验证、发布。每个阶段都尽量减少上下文切换。</p>
<p>工具并不是越多越好，关键是组合是否顺手。稳定且轻量的流程，长期来看更节省精力。</p>
<p>这套工具流会随着项目规模变化而调整，但核心原则不变：少折腾，多交付。</p>
